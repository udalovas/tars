name: Release

on:
  push:
    branches: [main]

# Needed to create tags and GitHub Releases.
permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Tag and publish a release when the version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/release.sh
